<!-- HERO CAROUSEL -->
<section id="home_hero" class="home-hero">
  <div id="heroCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="4000">

    <div class="carousel-indicators">
      <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="0" class="active"></button>
      <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="1"></button>
      <button type="button" data-bs-target="#heroCarousel" data-bs-slide-to="2"></button>
    </div>

    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="img/hero1.webp" class="d-block w-100 hero-img" data-i18n-attr="alt:carousel.slide1.imgAlt" alt="Olio extravergine di oliva in una bottiglia di vetro">
        <div class="carousel-caption">
          <h1 data-i18n="carousel.slide1.title">Una storia di famiglia</h1>
          <p data-i18n="carousel.slide1.subtitle">Produciamo olio di oliva di primissima qualità, ricavato esclusivamente da olive provenienti dai nostri terreni.</p>
          <!-- <a href="#contatti" class="btn btn-success btn-lg" data-i18n="carousel.slide1.button">Scopri di più</a> -->
        </div>
      </div>

      <div class="carousel-item">
        <img src="img/hero2.webp" class="d-block w-100 hero-img" data-i18n-attr="alt:carousel.slide2.imgAlt" alt="Raccolta manuale delle olive">
        <div class="carousel-caption">
          <h1 data-i18n="carousel.slide2.title">Raccolta manuale</h1>
          <p data-i18n="carousel.slide2.subtitle">Tradizione e rispetto della natura</p>
        </div>
      </div>

      <div class="carousel-item">
        <img src="img/hero5.webp" class="d-block w-100 hero-img" data-i18n-attr="alt:carousel.slide3.imgAlt" alt="Bottiglia di olio extravergine">
        <div class="carousel-caption">
          <h1 data-i18n="carousel.slide3.title">Produzione limitata</h1>
          <p data-i18n="carousel.slide3.subtitle">Qualità, non quantità</p>
        </div>
      </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>

  </div>
</section>
